<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS LCM | Track & Field</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --track-color: #561269;
            --lane-line: rgba(255, 255, 255, 0.3);
            --gold: #FFB81C;
        }

        #game-container {
            width: 800px;
            height: 400px;
            background-color: #110518;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0,0,0,0.8);
            margin: 0 auto;
            user-select: none;
            cursor: pointer;
        }

        /* Parallax Background */
        .stadium-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 150px;
            background-image: radial-gradient(circle at 50px 50px, rgba(255,255,255,0.1) 10px, transparent 11px);
            background-size: 100px 100px;
            z-index: 0;
        }

        /* The Track */
        .track-surface {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px;
            background: linear-gradient(to bottom, #3a0b47, #1A0524);
            border-top: 4px solid #fff;
            z-index: 1;
        }

        .lane {
            position: absolute;
            width: 100%;
            height: 125px;
            border-bottom: 4px dashed var(--lane-line);
        }
        .lane-top { top: 0; }
        .lane-bottom { top: 125px; border-bottom: none; }

        /* Entities */
        .runner {
            position: absolute;
            width: 60px;
            height: 60px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10;
            transform-origin: bottom center;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.5));
        }

        #player { background-image: url('/public/images/mascots/panthers.png'); }
        #bot { background-image: url('/public/images/mascots/tigers.png'); filter: drop-shadow(0 10px 5px rgba(0,0,0,0.5)) brightness(0.9); }

        .hurdle {
            position: absolute;
            width: 20px;
            height: 50px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #e74c3c 10px, #e74c3c 20px);
            border: 2px solid #fff;
            border-radius: 4px;
            z-index: 5;
            box-shadow: -5px 5px 10px rgba(0,0,0,0.5);
        }

        .finish-line {
            position: absolute;
            width: 30px;
            height: 250px;
            background: repeating-linear-gradient(0deg, #fff, #fff 20px, #000 20px, #000 40px);
            bottom: 0;
            z-index: 2;
            opacity: 0.8;
            box-shadow: -10px 0 20px rgba(255,184,28,0.5);
        }

        /* Animations */
        @keyframes runAnim {
            0% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0) rotate(-5deg); }
        }
        .running { animation: runAnim 0.3s infinite; }
        
        .stumble { filter: grayscale(1) brightness(0.5) !important; transform: rotate(45deg) !important; }

        /* Progress Bars */
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.1s linear; }
        #prog-purple { background: #b84dd9; box-shadow: 0 0 10px #b84dd9; }
        #prog-gold { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body class="bg-[#1A0524] text-white font-['Poppins'] min-h-screen flex flex-col pt-10 pb-10">

    <nav class="w-full px-6 absolute top-6 z-50">
        <a href="games.html" class="inline-flex items-center text-xs font-bold tracking-widest uppercase text-white/50 hover:text-[#FFB81C] transition-colors bg-black/40 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md">
            <i class="fa-solid fa-arrow-left mr-3"></i> Leave Arena
        </a>
    </nav>

    <div class="text-center mb-4 mt-4">
        <h1 class="font-freshman text-5xl text-white tracking-widest uppercase text-glow-white">100M <span class="text-[#FFB81C]">HURDLES</span></h1>
        <p class="text-[#def5ff]/60 text-xs mt-2 uppercase tracking-widest border border-white/10 inline-block px-4 py-1 rounded bg-black/40">PRESS SPACEBAR OR CLICK TO JUMP</p>
    </div>

    <!-- SCOREBOARD & PROGRESS -->
    <div class="max-w-3xl mx-auto w-full bg-black/60 border border-white/10 rounded-2xl p-6 mb-6 shadow-2xl backdrop-blur-md flex flex-col gap-4">
        
        <!-- Team Gold (Bot) Progress -->
        <div class="flex items-center gap-4 w-full">
            <img src="/public/images/mascots/tigers.png" class="w-10 h-10 object-contain drop-shadow-[0_0_10px_#FFB81C]">
            <div class="flex-grow">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest mb-1 text-[#FFB81C]">
                    <span>Team Gold (AI)</span>
                    <span id="dist-gold">0m</span>
                </div>
                <div class="progress-track"><div id="prog-gold" class="progress-fill"></div></div>
            </div>
        </div>

        <!-- Team Purple (Player) Progress -->
        <div class="flex items-center gap-4 w-full">
            <img src="/public/images/mascots/panthers.png" class="w-10 h-10 object-contain drop-shadow-[0_0_10px_#561269]">
            <div class="flex-grow">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest mb-1 text-[#b84dd9]">
                    <span>Team Purple (You)</span>
                    <span id="dist-purple">0m</span>
                </div>
                <div class="progress-track"><div id="prog-purple" class="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- THE TRACK -->
    <div id="game-container">
        <div class="stadium-bg" id="stadium-bg"></div>
        
        <div class="track-surface">
            <div class="lane lane-top"></div>
            <div class="lane lane-bottom"></div>
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="absolute inset-0 bg-black/70 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <h2 class="font-freshman text-6xl text-white mb-2">READY</h2>
            <button id="start-btn" class="mt-6 bg-[#FFB81C] text-[#1A0524] font-bold px-8 py-3 rounded uppercase tracking-widest hover:bg-white transition-colors shadow-[0_0_20px_rgba(255,184,28,0.5)]">Start Race</button>
        </div>

        <!-- Finish Line (Injected dynamically) -->
        <div id="finish-line" class="finish-line" style="display: none;"></div>

        <!-- Runners -->
        <div id="bot" class="runner"></div>
        <div id="player" class="runner"></div>
    </div>

    <!-- GAME OVER OVERLAY -->
    <div id="overlay" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="text-center bg-[#1A0524] p-12 border-2 border-[#FFB81C] rounded-2xl shadow-[0_0_50px_rgba(255,184,28,0.3)]">
            <h2 id="overlay-title" class="font-freshman text-6xl text-white mb-4">RACE OVER</h2>
            <p id="overlay-subtitle" class="text-[#def5ff]/70 tracking-widest uppercase mb-2 text-xl"></p>
            <p id="overlay-time" class="text-[#FFB81C] font-mono text-2xl mb-8"></p>
            <button id="resume-btn" class="bg-[#FFB81C] text-[#1A0524] font-bold px-8 py-3 rounded uppercase tracking-widest hover:bg-white transition-colors">Race Again</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const width = 800;
        const height = 400;
        
        // Game Constants
        const RACE_DISTANCE = 10000; // 10,000 pixels = 100m
        const GRAVITY = 0.8;
        const JUMP_POWER = -14;
        const BASE_SPEED = 8;
        const MAX_SPEED = 14;
        const STUMBLE_PENALTY = 0.3; // Speed multiplier when hitting a hurdle
        
        let isPlaying = false;
        let startTime;
        
        // Track Elements
        const playerEl = document.getElementById('player');
        const botEl = document.getElementById('bot');
        const bgEl = document.getElementById('stadium-bg');
        const finishLineEl = document.getElementById('finish-line');
        let hurdles = [];

        // Runner Class
        class Runner {
            constructor(el, laneY, isBot) {
                this.el = el;
                this.laneY = laneY; // Bottom Y of the lane
                this.isBot = isBot;
                
                this.distance = 0; // Absolute distance traveled
                this.y = 0; // Vertical jump position (0 is ground)
                this.vy = 0;
                this.speed = BASE_SPEED;
                this.stumbleTimer = 0;
                this.isJumping = false;
                
                this.screenX = isBot ? 100 : 100; // Bot's screenX will adjust dynamically relative to player
                this.width = 60;
                this.height = 60;
            }

            jump() {
                if (!this.isJumping && this.stumbleTimer === 0) {
                    this.vy = JUMP_POWER;
                    this.isJumping = true;
                    this.el.classList.remove('running');
                }
            }

            stumble() {
                if (this.stumbleTimer === 0) {
                    this.stumbleTimer = 60; // Frames of penalty
                    this.speed *= STUMBLE_PENALTY;
                    this.el.classList.add('stumble');
                    this.el.classList.remove('running');
                    
                    // Flash effect
                    this.el.style.filter = 'brightness(2) drop-shadow(0 0 20px red)';
                    setTimeout(() => this.el.style.filter = '', 200);
                }
            }

            update() {
                // Horizontal Speed Recovery
                if (this.stumbleTimer > 0) {
                    this.stumbleTimer--;
                    if (this.stumbleTimer === 0) {
                        this.el.classList.remove('stumble');
                        if(this.y === 0) this.el.classList.add('running');
                    }
                } else {
                    if (this.speed < MAX_SPEED) this.speed += 0.05; // Accelerate
                }

                this.distance += this.speed;

                // Vertical Jump Physics
                if (this.isJumping) {
                    this.vy += GRAVITY;
                    this.y += this.vy;

                    if (this.y >= 0) {
                        this.y = 0;
                        this.vy = 0;
                        this.isJumping = false;
                        if(this.stumbleTimer === 0) this.el.classList.add('running');
                    }
                }
            }
        }

        let player, bot;

        function initRace() {
            // Remove old hurdles
            hurdles.forEach(h => h.el.remove());
            hurdles = [];

            player = new Runner(playerEl, 360, false);
            bot = new Runner(botEl, 240, true);

            player.el.style.top = `${player.laneY - player.height}px`;
            bot.el.style.top = `${bot.laneY - bot.height}px`;

            // Generate Hurdles
            for (let i = 800; i < RACE_DISTANCE - 500; i += Math.random() * 600 + 400) {
                // Top Lane Hurdle (Bot)
                createHurdle(i, bot.laneY, true);
                // Bottom Lane Hurdle (Player)
                createHurdle(i + (Math.random()*200 - 100), player.laneY, false);
            }

            finishLineEl.style.display = 'none';
            document.getElementById('prog-purple').style.width = '0%';
            document.getElementById('prog-gold').style.width = '0%';
            
            document.getElementById('start-screen').style.display = 'none';
            
            player.el.classList.add('running');
            bot.el.classList.add('running');
            
            startTime = Date.now();
            isPlaying = true;
            gameLoop();
        }

        function createHurdle(dist, laneY, isTop) {
            const el = document.createElement('div');
            el.className = 'hurdle';
            container.appendChild(el);
            hurdles.push({ distance: dist, laneY: laneY, el: el, width: 20, height: 50, hit: false, isTop: isTop });
        }

        // --- Inputs ---
        function handleJump() {
            if (isPlaying) player.jump();
        }
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); handleJump(); }
        });
        container.addEventListener('mousedown', handleJump);

        // --- Bot AI ---
        function updateBot() {
            // Find next hurdle in bot's lane
            const nextHurdle = hurdles.find(h => h.isTop && h.distance > bot.distance && !h.hit);
            
            if (nextHurdle) {
                const distToHurdle = nextHurdle.distance - bot.distance;
                
                // If hurdle is right in front, jump!
                if (distToHurdle < 180 && distToHurdle > 140) {
                    // 10% chance to miscalculate and hit it (makes it beatable)
                    if (Math.random() > 0.10) {
                        bot.jump();
                    }
                }
            }
        }

        // --- Game Engine ---
        function checkCollisions(runner, isTopLane) {
            hurdles.forEach(h => {
                if (h.isTop !== isTopLane || h.hit) return;

                // AABB Collision (Horizontal overlap + Vertical check)
                if (runner.distance + runner.width > h.distance && 
                    runner.distance < h.distance + h.width) {
                    
                    // If runner's bottom (y) is lower than the hurdle's height
                    if (runner.y > -h.height + 10) { 
                        runner.stumble();
                        h.hit = true; // Can only hit a hurdle once
                        h.el.style.transform = 'rotate(90deg) translateY(20px)'; // Knock it over
                        h.el.style.opacity = '0.5';
                    }
                }
            });
        }

        function gameLoop() {
            if (!isPlaying) return;

            player.update();
            bot.update();
            updateBot();

            checkCollisions(player, false);
            checkCollisions(bot, true);

            // --- Rendering Camera (Follows Player) ---
            const cameraX = player.distance - 100;

            // Player stays at X:100 on screen, just moves up and down
            player.el.style.left = '100px';
            player.el.style.top = `${player.laneY - player.height + player.y}px`;

            // Bot moves relative to player's camera
            const botScreenX = bot.distance - cameraX;
            bot.el.style.left = `${botScreenX}px`;
            bot.el.style.top = `${bot.laneY - bot.height + bot.y}px`;

            // Scroll Parallax Background
            bgEl.style.backgroundPosition = `${-cameraX * 0.2}px 0`;

            // Render Hurdles
            hurdles.forEach(h => {
                const screenX = h.distance - cameraX;
                if (screenX > -50 && screenX < width + 50) {
                    h.el.style.display = 'block';
                    h.el.style.left = `${screenX}px`;
                    h.el.style.top = `${h.laneY - h.height}px`;
                } else {
                    h.el.style.display = 'none'; // Cull off-screen
                }
            });

            // Render Finish Line
            const finishLineScreenX = RACE_DISTANCE - cameraX;
            if (finishLineScreenX < width + 100) {
                finishLineEl.style.display = 'block';
                finishLineEl.style.left = `${finishLineScreenX}px`;
            }

            // --- UI Updates ---
            const pProg = Math.min((player.distance / RACE_DISTANCE) * 100, 100).toFixed(1);
            const bProg = Math.min((bot.distance / RACE_DISTANCE) * 100, 100).toFixed(1);
            
            document.getElementById('prog-purple').style.width = `${pProg}%`;
            document.getElementById('dist-purple').innerText = `${pProg}m`;
            
            document.getElementById('prog-gold').style.width = `${bProg}%`;
            document.getElementById('dist-gold').innerText = `${bProg}m`;

            // --- Win Condition ---
            if (player.distance >= RACE_DISTANCE || bot.distance >= RACE_DISTANCE) {
                triggerGameOver(player.distance >= bot.distance ? 'purple' : 'gold');
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function triggerGameOver(winner) {
            isPlaying = false;
            player.el.classList.remove('running');
            bot.el.classList.remove('running');
            
            const timeSeconds = ((Date.now() - startTime) / 1000).toFixed(2);
            
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('overlay-title');
            const sub = document.getElementById('overlay-subtitle');
            
            if (winner === 'purple') {
                title.innerText = "VICTORY!";
                title.style.color = "#b84dd9";
                sub.innerText = "You claimed the Gold for Team Purple.";
            } else {
                title.innerText = "DEFEAT.";
                title.style.color = "red";
                sub.innerText = "Team Gold outran you.";
            }
            
            document.getElementById('overlay-time').innerText = `TIME: ${timeSeconds}s`;
            overlay.classList.remove('hidden');
        }

        document.getElementById('start-btn').addEventListener('click', initRace);
        
        document.getElementById('resume-btn').addEventListener('click', () => {
            document.getElementById('overlay').classList.add('hidden');
            initRace();
        });

    </script>
</body>
</html>
