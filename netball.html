<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS LCM | Netball Gauntlet</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pitch-color: #110518;
            --line-color: rgba(255, 184, 28, 0.4);
            --accent-purple: #b84dd9;
        }

        #game-container {
            width: 500px;
            height: 700px;
            background-color: var(--pitch-color);
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0,0,0,0.8);
            margin: 0 auto;
            user-select: none;
            touch-action: none; 
        }

        /* Court Markings */
        .shooting-circle { position: absolute; width: 500px; height: 500px; border: 4px solid var(--line-color); border-radius: 50%; top: -150px; left: 0; pointer-events: none; }
        .third-line { position: absolute; width: 100%; height: 4px; background: var(--line-color); top: 450px; pointer-events: none; }

        /* The Hoop */
        #hoop { position: absolute; width: 50px; height: 50px; border: 6px solid #e74c3c; border-radius: 50%; top: 60px; left: 225px; box-shadow: 0 0 20px rgba(231, 76, 60, 0.8), inset 0 0 10px rgba(231, 76, 60, 0.5); z-index: 5; }
        .hoop-pole { position: absolute; width: 8px; height: 60px; background: #fff; top: 0; left: 246px; z-index: 4; }

        /* Entities */
        .entity { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); background-size: 80%; background-position: center; background-repeat: no-repeat; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }

        #player { width: 48px; height: 48px; background-color: #561269; border: 3px solid var(--accent-purple); background-image: url('/public/images/mascots/panthers.png'); z-index: 10; }
        
        .defender { width: 48px; height: 48px; background-color: #1A0524; border: 3px solid #FFB81C; background-image: url('/public/images/mascots/tigers.png'); z-index: 15; transition: filter 0.2s; }

        #ball { width: 20px; height: 20px; background-color: #fff; border: 2px solid #333; background-image: radial-gradient(circle at 30% 30%, #fff, #ddd); z-index: 20; cursor: pointer; }
        #ball:hover { box-shadow: 0 0 15px #fff; }

        /* Aiming Line */
        #aim-line { position: absolute; height: 4px; background: rgba(255, 255, 255, 0.5); transform-origin: left center; display: none; z-index: 1; pointer-events: none; }
        
        /* Dynamic Stage Announcements */
        #stage-announcer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Freshman', sans-serif; font-size: 6rem; color: rgba(255,255,255,0.1); pointer-events: none; z-index: 2; width: 100%; text-align: center;}

        /* Flashes */
        .flash-gold { animation: flashGold 0.5s ease-out; }
        .flash-purple { animation: flashPurple 0.5s ease-out; }
        .flash-red { animation: flashRed 0.5s ease-out; }

        @keyframes flashGold { 0% { box-shadow: inset 0 0 100px rgba(255, 184, 28, 0.8); background-color: rgba(255, 184, 28, 0.3); } 100% { box-shadow: inset 0 0 50px rgba(0,0,0,0.8); background-color: var(--pitch-color); } }
        @keyframes flashPurple { 0% { box-shadow: inset 0 0 100px rgba(184, 77, 217, 0.8); background-color: rgba(86, 18, 105, 0.5); } 100% { box-shadow: inset 0 0 50px rgba(0,0,0,0.8); background-color: var(--pitch-color); } }
        @keyframes flashRed { 0% { box-shadow: inset 0 0 100px rgba(231, 76, 60, 0.8); background-color: rgba(231, 76, 60, 0.3); } 100% { box-shadow: inset 0 0 50px rgba(0,0,0,0.8); background-color: var(--pitch-color); } }
    </style>
</head>
<body class="bg-[#1A0524] text-white font-['Poppins'] min-h-screen flex flex-col pt-10 pb-10">

    <nav class="w-full px-6 absolute top-6 z-50">
        <a href="games.html" class="inline-flex items-center text-xs font-bold tracking-widest uppercase text-white/50 hover:text-[#FFB81C] transition-colors bg-black/40 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md">
            <i class="fa-solid fa-arrow-left mr-3"></i> Leave Arena
        </a>
    </nav>

    <div class="text-center mb-6 mt-8">
        <h1 class="font-freshman text-5xl text-white tracking-widest uppercase text-glow-white">THE 10-STAGE <span class="text-[#FFB81C]">GAUNTLET</span></h1>
        <p class="text-[#def5ff]/60 text-xs mt-3 uppercase tracking-widest">Clear 10 stages to win. 3 Turnovers = Game Over.</p>
    </div>

    <div class="max-w-2xl mx-auto w-full flex justify-between items-center bg-black/60 border border-white/10 rounded-2xl p-4 mb-6 shadow-2xl backdrop-blur-md">
        <div class="flex items-center gap-4 w-1/3">
            <img src="/public/images/mascots/panthers.png" class="w-12 h-12 object-contain filter drop-shadow-[0_0_10px_#561269]">
            <div class="text-left">
                <p class="text-[10px] font-bold text-[#b84dd9] uppercase tracking-widest">Stages Cleared</p>
                <span id="score-cleared" class="font-freshman text-4xl">0</span><span class="text-white/30 font-freshman text-2xl">/10</span>
            </div>
        </div>

        <div class="text-center w-1/3 flex flex-col items-center">
            <span class="text-xs font-bold text-[#def5ff]/50 uppercase tracking-widest mb-1">Current Phase</span>
            <div id="stage-display" class="font-freshman text-3xl text-white tracking-widest bg-white/10 px-6 py-2 rounded-lg border border-white/20">STAGE 1</div>
            <button id="start-btn" class="mt-3 bg-[#FFB81C] text-[#1A0524] text-xs font-bold px-4 py-1 rounded uppercase tracking-widest hover:bg-white transition-colors">Enter Gauntlet</button>
        </div>

        <div class="flex items-center gap-4 w-1/3 justify-end">
            <div class="text-right">
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Turnovers</p>
                <span id="score-turnovers" class="font-freshman text-4xl text-red-500">0</span><span class="text-white/30 font-freshman text-2xl">/3</span>
            </div>
            <img src="/public/images/mascots/tigers.png" class="w-12 h-12 object-contain filter drop-shadow-[0_0_10px_#FFB81C] grayscale opacity-50" id="tiger-icon">
        </div>
    </div>

    <div id="game-container">
        <div class="shooting-circle"></div>
        <div class="third-line"></div>
        <div class="hoop-pole"></div>
        <div id="hoop"></div>
        
        <div id="stage-announcer">1</div>
        <div id="aim-line"></div>
        
        <div id="player" class="entity hidden"></div>
        <div id="ball" class="entity hidden"></div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="text-center bg-[#1A0524] p-12 border-2 border-[#FFB81C] rounded-2xl shadow-[0_0_50px_rgba(255,184,28,0.3)]">
            <h2 id="overlay-title" class="font-freshman text-6xl text-white mb-4">GAME OVER</h2>
            <p id="overlay-subtitle" class="text-[#def5ff]/70 tracking-widest uppercase mb-8">You reached Stage X.</p>
            <button id="resume-btn" class="bg-[#FFB81C] text-[#1A0524] font-bold px-8 py-3 rounded uppercase tracking-widest hover:bg-white transition-colors">Try Again</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const width = 500;
        const height = 700;
        
        const hoopObj = { x: 250, y: 85, radius: 25 };
        const centerPoint = { x: 250, y: 100, radius: 250 };

        let isPlaying = false;
        let currentStage = 1;
        let turnovers = 0;
        const MAX_TURNOVERS = 3;

        const stageData = [
            { defs: [{x: 250, y: 250, speed: 2, radius: 24}] }, 
            { defs: [{x: 250, y: 300, speed: 4, radius: 24}] }, 
            { defs: [{x: 150, y: 200, speed: 3, radius: 24}, {x: 350, y: 350, speed: -3, radius: 24}] }, 
            { defs: [{x: 150, y: 250, speed: 4.5, radius: 24}, {x: 350, y: 350, speed: -4.5, radius: 24}] }, 
            { defs: [{x: 250, y: 150, speed: 5, radius: 24}, {x: 250, y: 300, speed: -5, radius: 24}] }, 
            { defs: [{x: 100, y: 200, speed: 3, radius: 24}, {x: 250, y: 300, speed: -4, radius: 24}, {x: 400, y: 400, speed: 3, radius: 24}] }, 
            { defs: [{x: 100, y: 180, speed: 5, radius: 24}, {x: 250, y: 280, speed: -5, radius: 24}, {x: 400, y: 380, speed: 5, radius: 24}] }, 
            { defs: [{x: 50, y: 200, speed: 6, radius: 24}, {x: 250, y: 300, speed: -6, radius: 24}, {x: 450, y: 400, speed: 6, radius: 24}] }, 
            { defs: [{x: 100, y: 150, speed: 4, radius: 24}, {x: 400, y: 250, speed: -5, radius: 24}, {x: 100, y: 350, speed: 6, radius: 24}, {x: 400, y: 450, speed: -4, radius: 24}] }, 
            { defs: [{x: 250, y: 150, speed: 7, radius: 24}, {x: 250, y: 250, speed: -8, radius: 24}, {x: 250, y: 350, speed: 7, radius: 24}, {x: 250, y: 450, speed: -8, radius: 24}] } 
        ];

        let ball = { x: 250, y: 500, vx: 0, vy: 0, radius: 10, isFlying: false };
        let player = { x: 250, y: 500 };
        let activeDefenders = [];

        let isDragging = false;
        let dragStartX, dragStartY;
        const aimLine = document.getElementById('aim-line');
        const ballEl = document.getElementById('ball');
        const playerEl = document.getElementById('player');
        const stageAnnouncer = document.getElementById('stage-announcer');

        function loadStage(stageNum) {
            activeDefenders.forEach(d => d.el.remove());
            activeDefenders = [];

            const data = stageData[stageNum - 1];
            
            data.defs.forEach((dData, index) => {
                const el = document.createElement('div');
                el.className = 'entity defender';
                container.appendChild(el);
                
                activeDefenders.push({
                    id: `d${index}`,
                    x: dData.x,
                    y: dData.y,
                    speed: dData.speed,
                    radius: dData.radius,
                    el: el
                });
            });

            document.getElementById('stage-display').innerText = `STAGE ${stageNum}`;
            stageAnnouncer.innerText = stageNum;
            positionPlayerRandomly();
        }

        function positionPlayerRandomly() {
            const minAngle = Math.PI * 0.25; 
            const maxAngle = Math.PI * 0.75;
            const angle = Math.random() * (maxAngle - minAngle) + minAngle;
            
            player.x = centerPoint.x + centerPoint.radius * Math.cos(angle);
            player.y = centerPoint.y + centerPoint.radius * Math.sin(angle);
            
            playerEl.style.left = `${player.x}px`;
            playerEl.style.top = `${player.y}px`;
            
            resetBall();
        }

        function resetBall() {
            ball.isFlying = false;
            ball.vx = 0;
            ball.vy = 0;
            ball.x = player.x;
            ball.y = player.y - 30; 
            updateBallPos();
        }

        function updateBallPos() {
            ballEl.style.left = `${ball.x}px`;
            ballEl.style.top = `${ball.y}px`;
        }

        /* --- Unified Pointer Controls (Replaces Mouse Listeners) --- */
        ballEl.addEventListener('pointerdown', (e) => {
            if (!isPlaying || ball.isFlying) return;
            isDragging = true;
            
            // Lock pointer capture to allow dragging outside element bounds cleanly
            ballEl.setPointerCapture(e.pointerId);
            
            const rect = container.getBoundingClientRect();
            dragStartX = e.clientX - rect.left;
            dragStartY = e.clientY - rect.top;
            aimLine.style.display = 'block';
        });

        container.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            updateAimLine(e.clientX - rect.left, e.clientY - rect.top);
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            aimLine.style.display = 'none';

            const rect = container.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            let dx = dragStartX - endX;
            let dy = dragStartY - endY;
            
            const distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > 10) {
                const powerMultiplier = 0.25; 
                ball.vx = dx * powerMultiplier;
                ball.vy = dy * powerMultiplier;
                ball.isFlying = true;
            }
        });

        function updateAimLine(mouseX, mouseY) {
            const dx = dragStartX - mouseX;
            const dy = dragStartY - mouseY;
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 200); 
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;

            aimLine.style.left = `${ball.x}px`;
            aimLine.style.top = `${ball.y}px`;
            aimLine.style.width = `${distance}px`;
            aimLine.style.transform = `translateY(-50%) rotate(${angle}deg)`;
            
            if(distance > 150) aimLine.style.background = 'rgba(231, 76, 60, 0.8)';
            else if (distance > 75) aimLine.style.background = 'rgba(241, 196, 15, 0.8)';
            else aimLine.style.background = 'rgba(255, 255, 255, 0.5)';
        }

        // --- Game Engine ---
        function gameLoop() {
            if (!isPlaying) return;

            activeDefenders.forEach(d => {
                d.x += d.speed;
                if (d.x < d.radius || d.x > width - d.radius) {
                    d.speed *= -1; 
                }
                d.el.style.left = `${d.x}px`;
                d.el.style.top = `${d.y}px`;
            });

            if (ball.isFlying) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                updateBallPos();
                checkCollisions();
            }

            requestAnimationFrame(gameLoop);
        }

        function checkCollisions() {
            let dxH = ball.x - hoopObj.x;
            let dyH = ball.y - hoopObj.y;
            if (Math.sqrt(dxH*dxH + dyH*dyH) < hoopObj.radius) {
                handleResult('goal');
                return;
            }

            for (let d of activeDefenders) {
                let dxD = ball.x - d.x;
                let dyD = ball.y - d.y;
                if (Math.sqrt(dxD*dxD + dyD*dyD) < (ball.radius + d.radius)) {
                    d.el.style.filter = 'brightness(2) drop-shadow(0 0 20px #FFB81C)';
                    setTimeout(() => d.el.style.filter = '', 500);
                    handleResult('intercept');
                    return;
                }
            }

            if (ball.x < 0 || ball.x > width || ball.y < 0 || ball.y > height) {
                handleResult('out');
            }
        }

        function handleResult(resultType) {
            ball.isFlying = false;
            isPlaying = false; 
            
            if (resultType === 'goal') {
                container.classList.add('flash-purple');
                document.getElementById('score-cleared').innerText = currentStage;
                
                setTimeout(() => {
                    container.classList.remove('flash-purple');
                    currentStage++;
                    if (currentStage > 10) {
                        triggerVictory();
                    } else {
                        loadStage(currentStage);
                        isPlaying = true;
                        gameLoop();
                    }
                }, 800);

            } else {
                turnovers++;
                document.getElementById('score-turnovers').innerText = turnovers;
                document.getElementById('tiger-icon').classList.remove('grayscale', 'opacity-50');
                
                if (resultType === 'intercept') {
                    container.classList.add('flash-gold');
                } else {
                    container.classList.add('flash-red');
                }

                setTimeout(() => {
                    container.classList.remove('flash-gold', 'flash-red');
                    if (turnovers >= MAX_TURNOVERS) {
                        triggerGameOver();
                    } else {
                        positionPlayerRandomly();
                        isPlaying = true;
                        gameLoop();
                    }
                }, 800);
            }
        }

        function triggerGameOver() {
            isPlaying = false;
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-title').innerText = "ELIMINATED";
            document.getElementById('overlay-subtitle').innerText = `You fell at Stage ${currentStage}.`;
            document.getElementById('resume-btn').innerText = "Try Again";
            document.getElementById('resume-btn').onclick = () => location.reload();
            overlay.classList.remove('hidden');
        }

        function triggerVictory() {
            isPlaying = false;
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-title').innerText = "CHAMPION";
            document.getElementById('overlay-subtitle').innerText = "You conquered all 10 stages!";
            document.getElementById('resume-btn').innerText = "Play Again";
            document.getElementById('resume-btn').onclick = () => location.reload();
            overlay.classList.remove('hidden');
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            playerEl.classList.remove('hidden');
            ballEl.classList.remove('hidden');
            
            loadStage(currentStage);
            isPlaying = true;
            gameLoop();
        });
    </script>
</body>
</html>
