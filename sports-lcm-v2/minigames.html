<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS LCM | Tactical Domination</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --grid-color: rgba(255, 255, 255, 0.1);
            --grid-glow: rgba(255, 184, 28, 0.2);
        }

        #game-board {
            width: 700px;
            height: 600px;
            background-color: #110518;
            position: relative;
            margin: 0 auto;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px var(--grid-glow);
            border: 2px solid rgba(255, 184, 28, 0.5);
            z-index: 10;
        }

        /* The Columns you click on */
        .game-column {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column-reverse; /* Tokens stack from bottom */
            gap: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            border-radius: 5px;
        }

        .game-column:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* The drop indicators above the grid */
        .drop-indicator {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #b84dd9;
            font-size: 24px;
            opacity: 0;
            transition: all 0.2s;
            pointer-events: none;
        }

        .game-column:hover .drop-indicator {
            opacity: 1;
            top: -30px;
        }

        /* The empty slots */
        .slot {
            width: 100%;
            flex: 1;
            background-color: #1A0524;
            border-radius: 50%;
            border: 2px solid var(--grid-color);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
        }

        /* The Tokens */
        .token {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            top: -600px; /* Start way above for the drop animation */
            left: 0;
            transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); /* Bouncy drop */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .token-purple {
            background-color: #561269;
            border: 2px solid #b84dd9;
            background-image: url('/public/images/mascots/panthers.png');
            box-shadow: 0 0 20px rgba(184, 77, 217, 0.5);
        }

        .token-gold {
            background-color: #1A0524;
            border: 2px solid #FFB81C;
            background-image: url('/public/images/mascots/tigers.png');
            box-shadow: 0 0 20px rgba(255, 184, 28, 0.5);
        }

        /* Winning highlight */
        .winning-token {
            animation: pulseWin 1s infinite;
        }

        @keyframes pulseWin {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body class="bg-[#1A0524] text-white font-['Poppins'] min-h-screen flex flex-col pt-10 pb-10">

    <nav class="w-full px-6 absolute top-6 z-50">
        <a href="games.html" class="inline-flex items-center text-xs font-bold tracking-widest uppercase text-white/50 hover:text-[#FFB81C] transition-colors bg-black/40 px-4 py-2 rounded-full border border-white/10 backdrop-blur-md">
            <i class="fa-solid fa-arrow-left mr-3"></i> Leave Arena
        </a>
    </nav>

    <div class="text-center mb-6 mt-4">
        <h1 class="font-freshman text-5xl text-white tracking-widest uppercase text-glow-white">TACTICAL <span class="text-[#FFB81C]">DOMINATION</span></h1>
        <p class="text-[#def5ff]/60 text-xs mt-2 uppercase tracking-widest bg-black/40 inline-block px-4 py-1 rounded border border-white/10">CONNECT 4 CHAMPIONS TO WIN THE BATTLE OF MINDS</p>
    </div>

    <div class="max-w-3xl mx-auto w-full flex justify-between items-center bg-black/60 border border-white/10 rounded-2xl p-4 mb-10 shadow-2xl backdrop-blur-md">
        <div class="flex items-center gap-4 w-1/3">
            <img src="/public/images/mascots/panthers.png" class="w-12 h-12 object-contain filter drop-shadow-[0_0_10px_#561269]">
            <div class="text-left">
                <p class="text-[10px] font-bold text-[#b84dd9] uppercase tracking-widest">Team Purple (You)</p>
                <span id="score-purple" class="font-freshman text-4xl">0</span>
            </div>
        </div>

        <div class="text-center w-1/3 flex flex-col items-center">
            <span class="text-xs font-bold text-[#def5ff]/50 uppercase tracking-widest mb-1">System Status</span>
            <div id="turn-indicator" class="font-freshman text-xl text-[#b84dd9] tracking-widest bg-white/5 px-6 py-2 rounded-lg border border-white/10 w-full">YOUR TURN</div>
        </div>

        <div class="flex items-center gap-4 w-1/3 justify-end">
            <div class="text-right">
                <p class="text-[10px] font-bold text-[#FFB81C] uppercase tracking-widest">Team Gold (AI)</p>
                <span id="score-gold" class="font-freshman text-4xl">0</span>
            </div>
            <img src="/public/images/mascots/tigers.png" class="w-12 h-12 object-contain filter drop-shadow-[0_0_10px_#FFB81C]">
        </div>
    </div>

    <div id="game-board">
        </div>

    <div id="overlay" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="text-center bg-[#1A0524] p-12 border-2 border-[#FFB81C] rounded-2xl shadow-[0_0_50px_rgba(255,184,28,0.3)]">
            <h2 id="overlay-title" class="font-freshman text-6xl text-white mb-4">MATCH OVER</h2>
            <p id="overlay-subtitle" class="text-[#def5ff]/70 tracking-widest uppercase mb-8"></p>
            <button id="resume-btn" class="bg-[#FFB81C] text-[#1A0524] font-bold px-8 py-3 rounded uppercase tracking-widest hover:bg-white transition-colors">Play Next Round</button>
        </div>
    </div>

    <script>
        const ROWS = 6;
        const COLS = 7;
        const PLAYER = 1; // Purple
        const AI = 2;     // Gold

        let board = [];
        let isPlayerTurn = true;
        let isGameOver = false;
        let scorePurple = 0;
        let scoreGold = 0;

        const gameBoardEl = document.getElementById('game-board');
        const turnIndicator = document.getElementById('turn-indicator');
        const overlay = document.getElementById('overlay');

        // Initialize UI and State
        function initGame() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            gameBoardEl.innerHTML = '';
            isGameOver = false;
            isPlayerTurn = true;
            updateTurnUI();

            for (let c = 0; c < COLS; c++) {
                const colEl = document.createElement('div');
                colEl.className = 'game-column';
                colEl.dataset.col = c;
                
                const arrow = document.createElement('i');
                arrow.className = 'fa-solid fa-caret-down drop-indicator';
                colEl.appendChild(arrow);

                for (let r = 0; r < ROWS; r++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.dataset.row = r;
                    slot.dataset.col = c;
                    colEl.appendChild(slot);
                }

                colEl.addEventListener('click', () => handleHumanMove(c));
                gameBoardEl.appendChild(colEl);
            }
        }

        // --- Logic ---
        function getNextOpenRow(colData) {
            for (let r = 0; r < ROWS; r++) {
                if (board[r][colData] === 0) return r;
            }
            return -1; // Column full
        }

        function dropToken(col, playerType) {
            const row = getNextOpenRow(col);
            if (row === -1) return false;

            // Update State
            board[row][col] = playerType;

            // Update UI
            const colEl = gameBoardEl.children[col];
            // Since flex-direction is column-reverse, children index 1 is row 0. (Index 0 is the arrow icon)
            const targetSlot = colEl.children[row + 1]; 
            
            const token = document.createElement('div');
            token.className = `token ${playerType === PLAYER ? 'token-purple' : 'token-gold'}`;
            targetSlot.appendChild(token);

            // Trigger drop animation
            setTimeout(() => { token.style.top = '0'; }, 50);

            return { row, col };
        }

        function handleHumanMove(col) {
            if (!isPlayerTurn || isGameOver) return;
            
            const move = dropToken(col, PLAYER);
            if (!move) return; // Invalid move

            if (checkWin(move.row, move.col, PLAYER)) {
                endGame(PLAYER);
                return;
            }

            if (checkDraw()) {
                endGame(0);
                return;
            }

            // End Turn
            isPlayerTurn = false;
            updateTurnUI();
            
            // Trigger AI after delay to simulate "thinking"
            setTimeout(handleAIMove, 600);
        }

        // --- Smart AI Engine ---
        function handleAIMove() {
            if (isGameOver) return;

            let chosenCol = -1;

            // 1. Can AI win on this turn?
            chosenCol = findWinningMove(AI);
            
            // 2. Can Player win on next turn? (BLOCK THEM)
            if (chosenCol === -1) {
                chosenCol = findWinningMove(PLAYER);
            }

            // 3. Play the center column if available (Strategic advantage)
            if (chosenCol === -1 && getNextOpenRow(3) !== -1 && Math.random() > 0.4) {
                chosenCol = 3;
            }

            // 4. Pick random valid column
            if (chosenCol === -1) {
                const validCols = [];
                for (let c = 0; c < COLS; c++) {
                    if (getNextOpenRow(c) !== -1) validCols.push(c);
                }
                chosenCol = validCols[Math.floor(Math.random() * validCols.length)];
            }

            const move = dropToken(chosenCol, AI);

            if (checkWin(move.row, move.col, AI)) {
                endGame(AI);
                return;
            }

            if (checkDraw()) {
                endGame(0);
                return;
            }

            // Back to Player
            isPlayerTurn = true;
            updateTurnUI();
        }

        // Simulate a move to see if it results in a win
        function findWinningMove(playerType) {
            for (let c = 0; c < COLS; c++) {
                const r = getNextOpenRow(c);
                if (r !== -1) {
                    board[r][c] = playerType; // Temporary place
                    const wins = checkWin(r, c, playerType, true); // Silent check
                    board[r][c] = 0; // Remove temporary piece
                    if (wins) return c;
                }
            }
            return -1;
        }

        // --- Win Checking ---
        function checkWin(r, c, playerType, isSilent = false) {
            const directions = [
                [[0, 1], [0, -1]], // Horizontal
                [[1, 0], [-1, 0]], // Vertical
                [[1, 1], [-1, -1]], // Diagonal /
                [[1, -1], [-1, 1]]  // Diagonal \
            ];

            for (let dir of directions) {
                let count = 1;
                let winningTokens = [{r, c}]; // Store coordinates of the winning line

                for (let step of dir) {
                    let rOffset = r + step[0];
                    let cOffset = c + step[1];
                    
                    while (
                        rOffset >= 0 && rOffset < ROWS &&
                        cOffset >= 0 && cOffset < COLS &&
                        board[rOffset][cOffset] === playerType
                    ) {
                        count++;
                        winningTokens.push({r: rOffset, c: cOffset});
                        rOffset += step[0];
                        cOffset += step[1];
                    }
                }

                if (count >= 4) {
                    if (!isSilent) highlightWin(winningTokens);
                    return true;
                }
            }
            return false;
        }

        function checkDraw() {
            for (let c = 0; c < COLS; c++) {
                if (board[ROWS - 1][c] === 0) return false;
            }
            return true;
        }

        function highlightWin(tokens) {
            tokens.forEach(pos => {
                const colEl = gameBoardEl.children[pos.c];
                const slot = colEl.children[pos.r + 1];
                const token = slot.children[0];
                if (token) token.classList.add('winning-token');
            });
        }

        function updateTurnUI() {
            if (isPlayerTurn) {
                turnIndicator.innerText = "YOUR TURN";
                turnIndicator.style.color = "#b84dd9";
                turnIndicator.style.borderColor = "#b84dd9";
            } else {
                turnIndicator.innerText = "AI THINKING...";
                turnIndicator.style.color = "#FFB81C";
                turnIndicator.style.borderColor = "#FFB81C";
            }
        }

        function endGame(winner) {
            isGameOver = true;
            
            setTimeout(() => {
                const title = document.getElementById('overlay-title');
                const sub = document.getElementById('overlay-subtitle');

                if (winner === PLAYER) {
                    title.innerText = "TACTICAL VICTORY";
                    title.style.color = "#b84dd9";
                    sub.innerText = "You outsmarted the system.";
                    scorePurple++;
                    document.getElementById('score-purple').innerText = scorePurple;
                } else if (winner === AI) {
                    title.innerText = "SYSTEM DOMINATES";
                    title.style.color = "#FFB81C";
                    sub.innerText = "The AI calculated your defeat.";
                    scoreGold++;
                    document.getElementById('score-gold').innerText = scoreGold;
                } else {
                    title.innerText = "STALEMATE";
                    title.style.color = "#fff";
                    sub.innerText = "No tactical advantages remain.";
                }

                overlay.classList.remove('hidden');
            }, 1000); // Wait for the win animation to pulse a bit
        }

        document.getElementById('resume-btn').addEventListener('click', () => {
            overlay.classList.add('hidden');
            initGame();
        });

        // Boot
        initGame();

    </script>
</body>
</html>
