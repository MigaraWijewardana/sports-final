<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGV Headquarters | SPORTS LCM</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --igv-color: #561269;
            --igv-light: #b84dd9;
        }

        /* --- FIFA CARD BASE STYLES --- */
        .fut-card {
            position: relative;
            width: 260px;
            height: 360px; /* Reduced height slightly since stats are gone */
            background-size: cover;
            background-position: center;
            clip-path: polygon(10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%, 0 10%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            user-select: none;
        }

        .fut-card:hover {
            transform: translateY(-10px) scale(1.02);
            filter: brightness(1.1);
        }

        /* Top Section */
        .card-top-left {
            position: absolute;
            top: 30px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .card-rating { font-family: 'Freshman', sans-serif; font-size: 2.5rem; line-height: 1; }
        .card-position { font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 2px; margin-bottom: 4px; }

        /* Player Image */
        .card-image {
            width: 160px;
            height: 160px;
            object-fit: cover;
            object-position: top;
            margin-top: 30px;
            z-index: 10;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
        }

        /* Bottom Section */
        .card-bottom {
            position: absolute;
            bottom: 40px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-name {
            font-family: 'Freshman', sans-serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CARD TIERS --- */
        .card-commander {
            background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #FFD700 100%);
            color: #1A0505;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5), 0 15px 30px rgba(255, 184, 28, 0.4);
            border: 2px solid #FFF8DC;
        }
        .card-commander::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(125deg, transparent 20%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.6) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: foilShine 4s infinite linear;
            pointer-events: none;
        }
        @keyframes foilShine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .card-champion {
            background: linear-gradient(180deg, rgba(86,18,105,0.8) 0%, rgba(26,5,36,0.95) 100%);
            color: white;
            border: 1px solid var(--igv-light);
            box-shadow: inset 0 0 20px rgba(184,77,217,0.2), 0 10px 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="bg-[#1A0524] text-white font-['Poppins'] min-h-screen pb-20">

                <!-- LCVP 2 -->

        </section>

    </main>
</body>
