<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS LCM | Secure Your Spot</title>
    <link rel="icon" type="image/png" href="/public/images/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#1A0524] text-white font-['Poppins'] antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#561269]/40 via-[#1A0524] to-[#1A0524] min-h-screen flex flex-col">

    <nav class="w-full p-6 relative z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/index.html" class="inline-flex items-center text-sm font-bold tracking-widest uppercase text-[#def5ff]/70 hover:text-[#FFB81C] transition-colors">
                <i class="fa-solid fa-arrow-left mr-3"></i> Back to Arena
            </a>
            <a href="https://wa.me/94704533048?text=Hi%20Duwasha,%20I%20have%20a%20question%20about%20Sports%20LCM..." target="_blank" class="inline-flex items-center gap-2 bg-[#25D366]/10 hover:bg-[#25D366]/20 border border-[#25D366]/30 px-4 py-2 rounded-full text-[#25D366] text-xs font-bold tracking-wider transition-all">
                <i class="fa-brands fa-whatsapp text-lg"></i> Message OCVP
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-10 px-4 relative z-10">
        <div class="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
            
            <div class="md:sticky md:top-24 flex flex-col items-center text-center p-8 glass-card border-[#FFB81C]/20 shadow-[0_0_30px_rgba(86,18,105,0.4)]">
                
                <h2 id="entity-title" class="text-[#FFB81C] text-sm font-bold uppercase tracking-[0.3em] mb-8">LOADING FACTION...</h2>
                
                <div id="dynamic-theme-box" class="hidden flex flex-col items-center w-full transition-all duration-500">
                    <img id="team-mascot-img" src="" alt="Team Mascot" class="w-64 h-64 object-contain filter drop-shadow-[0_15px_25px_rgba(0,0,0,0.8)] mb-6 hover:scale-105 transition-transform duration-500">
                    <div id="team-name-display" class="font-freshman text-4xl sm:text-5xl text-white tracking-widest text-glow-white uppercase">TEAM NAME</div>
                </div>
                
                <div id="default-theme-box" class="flex flex-col items-center">
                    <div class="w-48 h-48 rounded-full bg-white/5 border-2 border-white/10 flex items-center justify-center p-6 shadow-2xl mb-6 backdrop-blur-sm">
                        <img src="/public/images/logo.png" alt="Sports LCM" class="w-full h-full object-contain drop-shadow-xl opacity-50 grayscale">
                    </div>
                    <p id="identity-lock-text" class="text-[#def5ff]/60 text-sm tracking-wider uppercase font-semibold">Identity Not Yet Locked</p>
                </div>
            </div>

            <div class="glass-card p-8 sm:p-10 border-white/10">
                <div class="mb-8">
                    <span class="inline-block w-3 h-3 rounded-full bg-[#2ecc71] animate-pulse mr-2 shadow-[0_0_10px_#2ecc71]"></span>
                    <span class="text-xs font-bold tracking-widest text-[#def5ff]/70 uppercase">Registration Active</span>
                    <h2 class="font-freshman text-4xl sm:text-5xl text-white mt-4 uppercase leading-tight">SECURE YOUR <br><span class="text-[#FFB81C]">ROSTER SPOT</span></h2>
                </div>

                <form id="delegate-form" class="space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">First Name</label>
                            <input type="text" id="first-name" placeholder="E.g., John" required class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all placeholder:text-white/20">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">Last Name</label>
                            <input type="text" id="last-name" placeholder="E.g., Doe" required class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all placeholder:text-white/20">
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" placeholder="E.g., 07XXXXXXXX" required class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all placeholder:text-white/20">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="flex flex-col" id="subteam-group">
                            <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">Sub-Team</label>
                            <select id="sub-team" required class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>Select...</option>
                            </select>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">Current Role</label>
                            <select id="role" required class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>Select...</option>
                                <option value="Member">Member</option>
                                <option value="Team Leader">Team Leader</option>
                                <option value="Manager">Manager</option>
                                <option value="Alumni">Alumni</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-xs font-bold tracking-wider text-[#def5ff]/80 uppercase mb-2">Position in Football (Optional)</label>
                        <select id="football-position" class="bg-[#1A0524]/60 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FFB81C] focus:ring-1 focus:ring-[#FFB81C] transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Select...</option>
                            <option value="Attacker">Attacker</option>
                            <option value="Mid-field">Mid-field</option>
                            <option value="Defence">Defence</option>
                            <option value="Goalie">Goalie</option>
                        </select>
                    </div>

                    <div class="flex items-start gap-4 mt-8 bg-white/5 p-4 rounded-lg border border-white/10">
                        <input type="checkbox" id="confirmation" required class="mt-1 w-5 h-5 accent-[#FFB81C] cursor-pointer rounded bg-[#1A0524] border-white/20">
                        <label for="confirmation" class="text-sm text-[#def5ff]/90 cursor-pointer leading-relaxed">
                            I am ready to awaken my competitiveness and confirm my active participation in the arena.
                        </label>
                    </div>

                    <div class="pt-6 flex flex-col gap-4">
                        <button type="submit" id="submit-btn" class="w-full bg-[#FFB81C] text-[#1A0524] font-bold text-lg px-8 py-4 rounded-lg shadow-[0_0_20px_rgba(255,184,28,0.4)] hover:bg-white hover:shadow-[0_0_30px_rgba(255,255,255,0.6)] transition-all uppercase tracking-widest">
                            Join The Roster
                        </button>
                        
                        <p id="success-message" class="hidden text-center bg-[#2ecc71]/20 border border-[#2ecc71]/50 text-[#2ecc71] font-bold tracking-wider p-4 rounded-lg uppercase">
                            Registration Successful! See you on the field.
                        </p>
                    </div>
                </form>
            </div>
            
        </div>
    </main>

    <script>
        document.getElementById('submit-btn').addEventListener('click', function() {
            const posSelect = document.getElementById('football-position');
            // If the select is still on the disabled default placeholder
            if (!posSelect.value) {
                const positions = ["Attacker", "Mid-field", "Defence", "Goalie"];
                const randomPos = positions[Math.floor(Math.random() * positions.length)];
                posSelect.value = randomPos;
            }
        });
    </script>

    <script src="/src/js/firebase.js"></script>
    <script src="/src/js/delegate.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParamsCheck = new URLSearchParams(window.location.search);
            const teamCheck = (urlParamsCheck.get('entity') || '').toUpperCase();
            
            if(teamCheck === 'IG' || teamCheck === 'ALUMNI') {
                const lockText = document.getElementById('identity-lock-text');
                if(lockText) {
                    lockText.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
