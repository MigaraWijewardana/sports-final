<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORTS LCM | 5v5 Futsal Showdown</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; touch-action: none; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        #game-wrapper {
            flex-grow: 1; position: relative; width: 100vw; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }

        canvas {
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255,255,255,0.05);
            max-width: 100%; max-height: 100%; object-fit: contain;
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%; pointer-events: none; z-index: 50;
        }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 15, 0.95); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;
        }

        .faction-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .faction-btn:hover { transform: scale(1.05) translateY(-5px); }

        #hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; align-items: center; z-index: 40; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
        }

        .score-num { font-family: 'Freshman', sans-serif; font-size: 3rem; text-shadow: 0 0 15px currentColor; }
        .hud-name { font-size: 0.7rem; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; color: white; opacity: 0.7; }
        #timer { font-family: monospace; font-size: 1.5rem; font-weight: bold; color: white; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 8px; transition: color 0.3s; }
        .timer-warning { color: #e74c3c !important; animation: pulse-text 1s infinite; }
        @keyframes pulse-text { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Controls Footer */
        #controls-footer {
            height: 60px; background: #05020a; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 60;
        }

        /* Mobile Controls */
        #mobile-controls { display: none; position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 60; pointer-events: none; }
        .joystick-base { width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); position: relative; backdrop-filter: blur(5px); pointer-events: auto; }
        .joystick-stick { width: 60px; height: 60px; background: rgba(255,255,255,0.3); border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        #mobile-kick-btn {
            width: 90px; height: 90px; border-radius: 50%; background: rgba(255,184,28,0.2); border: 2px solid #FFB81C;
            position: absolute; bottom: 0; right: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Freshman', sans-serif; color: #FFB81C; font-size: 1.2rem; pointer-events: auto;
            backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(255,184,28,0.2); transition: all 0.1s;
            user-select: none; -webkit-user-select: none;
        }
        #mobile-kick-btn:active { background: #FFB81C; color: #1A0524; transform: scale(0.9); }
        #mobile-kick-btn.cooldown { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3); box-shadow: none; transform: scale(1); }

        @media (max-width: 768px) { 
            #mobile-controls { display: block; } 
            #hud { top: 10px; transform: translateX(-50%) scale(0.8); } 
            .desktop-ctrl { display: none; }
            #controls-footer { display: none; }
        }
    </style>
</head>
<body>

    <nav class="absolute top-4 left-4 z-[110]">
        <a href="index.html" class="text-[10px] font-bold tracking-widest uppercase text-white hover:text-[#FFB81C] bg-black/60 px-4 py-2 rounded-full border border-white/20 backdrop-blur-md">

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="overlay-screen">
        <h1 class="font-freshman text-4xl md:text-6xl text-white mb-2 uppercase tracking-widest drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">5v5 ARENA</h1>
        <p class="text-[#def5ff]/60 text-sm tracking-[0.3em] uppercase mb-12 border-b border-white/10 pb-4">Select your allegiance</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 w-full max-w-4xl px-4">

                <span class="font-freshman text-2xl text-[#3498db]">iGV</span>

            <button class="faction-btn glass-card p-6 border-[#ffffff]/30 flex flex-col items-center group" onclick="startGame('iGT')">
                <img src="/public/images/mascots/wolfface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#ffffff] group-hover:scale-110 transition-transform" alt="iGT">
                <span class="font-freshman text-2xl text-[#ffffff]">iGT</span>
            </button>
            <button class="faction-btn glass-card p-6 border-[#7f8c8d]/30 flex flex-col items-center group" onclick="startGame('oGV')">
                <img src="/public/images/mascots/tigerface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#7f8c8d] group-hover:scale-110 transition-transform" alt="oGV">

            <button class="faction-btn glass-card p-6 border-[#f1c40f]/30 flex flex-col items-center group" onclick="startGame('oGT')">
                <img src="/public/images/mascots/phoenixface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#f1c40f] group-hover:scale-110 transition-transform" alt="oGT">
                <span class="font-freshman text-2xl text-[#f1c40f]">oGT</span>

        <p class="text-[#FFB81C] text-[10px] uppercase tracking-widest mt-10 font-bold">Match Duration: 3 Minutes | Dynamic Difficulty Enabled</p>

    <!-- POST MATCH SCREEN -->
    <div id="post-screen" class="overlay-screen" style="display: none; opacity: 0;">
        <h2 id="post-title" class="font-freshman text-6xl text-white uppercase tracking-widest mb-4">MATCH OVER</h2>
        <p id="post-subtitle" class="text-sm font-bold tracking-[0.3em] uppercase text-white/50 mb-10">Syncing with Mainframe...</p>
        
        <div class="flex items-center gap-8 mb-12 bg-white/5 p-8 rounded-2xl border border-white/10 shadow-2xl">
            <div class="text-center">
                <span class="block text-xs uppercase tracking-widest text-[#FFB81C] mb-2 font-bold" id="post-p1-name">YOU</span>

        <button onclick="location.reload()" class="bg-[#FFB81C] text-[#1A0524] font-bold px-12 py-4 rounded-full uppercase tracking-widest hover:bg-white transition-colors shadow-[0_0_20px_rgba(255,184,28,0.4)]">Play Again</button>
    </div>

    <!-- GAME AREA -->
    <div id="game-wrapper">
        <div id="hud" style="display: none;">
            <div class="flex flex-col items-center">
                <span class="hud-name" id="hud-faction-name">YOU</span>
                <span class="score-num" id="score-p1" style="color: #3498db;">0</span>

            <div class="flex flex-col items-center">
                <span class="hud-name text-[#FFB81C]">THE OC</span>

        <canvas id="pitch"></canvas>
        <div class="crt-overlay"></div>
        
        <div id="mobile-controls">
            <div class="joystick-base" id="joystick-base">

    <!-- Universal Controls Footer -->
    <div id="controls-footer">
        <div class="desktop-ctrl flex items-center gap-2 text-white/50 text-xs font-mono uppercase tracking-widest">
            <span class="border border-white/20 px-2 py-1 rounded bg-white/5 text-white">W</span>

        <div class="desktop-ctrl flex items-center gap-2 text-[#FFB81C] text-xs font-mono uppercase tracking-widest">
            <span class="border border-[#FFB81C]/50 px-6 py-1 rounded bg-[#FFB81C]/10 text-[#FFB81C] shadow-[0_0_10px_rgba(255,184,28,0.2)]">SPACE</span>
            <span class="ml-2">to Dash / Smash</span>

    <script src="/src/js/firebase.js"></script>

    <script>
        // --- GAME ASSETS & THEMES ---
        const themes = {
            'iGV': { color: '#3498db', img: '/public/images/mascots/pantherface.png', name: 'iGV' },
            'iGT': { color: '#ffffff', img: '/public/images/mascots/wolfface.png', name: 'iGT' },
            'oGV': { color: '#7f8c8d', img: '/public/images/mascots/tigerface.png', name: 'oGV' },
            'oGT': { color: '#f1c40f', img: '/public/images/mascots/phoenixface.png', name: 'oGT' }
        };
        const ocTheme = { color: '#561269', img: '/public/images/logo.png', name: 'THE OC' };

        let playerTheme = null;
        let playerImg = new Image();
        let ocImg = new Image();
        ocImg.src = ocTheme.img;

        // --- ENGINE SETUP ---
        const canvas = document.getElementById('pitch');
        const ctx = canvas.getContext('2d');
        const GAME_W = 1000;
        const GAME_H = 600;
        const GOAL_H = 180; 

        function resize() {
            const aspect = GAME_W / GAME_H;
            const wrapper = document.getElementById('game-wrapper');
            const windowAspect = wrapper.clientWidth / wrapper.clientHeight;
            
            if (windowAspect < aspect) {
                canvas.width = wrapper.clientWidth * 0.95;
                canvas.height = canvas.width / aspect;
            } else {
                canvas.height = wrapper.clientHeight * 0.85;
                canvas.width = canvas.height * aspect;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 5v5 PHYSICS ENTITIES ---
        const friction = 0.95; 
        const keys = { w: false, a: false, s: false, d: false, ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, ' ': false };

        // Captains (Sizes 25)
        let p1 = { x: 300, y: GAME_H/2, homeX: 300, homeY: GAME_H/2, vx: 0, vy: 0, r: 25, speed: 0.9, maxSpeed: 7, mass: 2, dashCooldown: 0, isPlayer: true };
        let oc_cap = { x: GAME_W - 300, y: GAME_H/2, homeX: GAME_W - 300, homeY: GAME_H/2, vx: 0, vy: 0, r: 25, mass: 2, role: 'field' }; 
        
        // Bots (Sizes 18)
        let team1 = [
            { x: 50, y: GAME_H/2, homeX: 50, homeY: GAME_H/2, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'goalie', baseSpeed: 0.4, maxSpeed: 4 },
            { x: 200, y: 150, homeX: 200, homeY: 150, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field', baseSpeed: 0.3, maxSpeed: 4 },
            { x: 200, y: 450, homeX: 200, homeY: 450, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field', baseSpeed: 0.3, maxSpeed: 4 },
            { x: 400, y: GAME_H/2, homeX: 400, homeY: GAME_H/2, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field', baseSpeed: 0.3, maxSpeed: 4 }
        ];

        let team2 = [
            { x: GAME_W - 50, y: GAME_H/2, homeX: GAME_W - 50, homeY: GAME_H/2, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'goalie' },
            { x: GAME_W - 200, y: 150, homeX: GAME_W - 200, homeY: 150, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field' },
            { x: GAME_W - 200, y: 450, homeX: GAME_W - 200, homeY: 450, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field' },
            { x: GAME_W - 400, y: GAME_H/2, homeX: GAME_W - 400, homeY: GAME_H/2, vx: 0, vy: 0, r: 18, mass: 1.5, role: 'field' }
        ];

        let ball = { x: GAME_W/2, y: GAME_H/2, vx: 0, vy: 0, r: 12, maxSpeed: 16, mass: 1, history: [] };

        // Combined array for easy collision loops
        const getEntities = () => [p1, ...team1, oc_cap, ...team2];

        let score1 = 0, score2 = 0, timeLeft = 180, isPlaying = false, matchOver = false;

        const fps = 60;
        const fpsInterval = 1000 / fps;
        let then = Date.now();

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', e => { 
            if(e.key === ' ') e.preventDefault(); 
            if(keys.hasOwnProperty(e.key)) keys[e.key] = true; 
        });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const mobKickBtn = document.getElementById('mobile-kick-btn');
        let joyActive = false, joyVec = { x: 0, y: 0 }, mobileKickPressed = false;

        joyBase.addEventListener('touchstart', handleJoyStart, {passive: false});
        joyBase.addEventListener('touchmove', handleJoyMove, {passive: false});
        window.addEventListener('touchend', handleJoyEnd);

        mobKickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); mobileKickPressed = true; }, {passive: false});
        mobKickBtn.addEventListener('touchend', (e) => { e.preventDefault(); mobileKickPressed = false; }, {passive: false});

        function handleJoyStart(e) { e.preventDefault(); joyActive = true; handleJoyMove(e); }
        function handleJoyMove(e) {
            if (!joyActive) return;
            e.preventDefault();
            const rect = joyBase.getBoundingClientRect();
            const touch = Array.from(e.touches).find(t => t.target === joyBase || t.target === joyStick);
            if(!touch) return;
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const distance = Math.hypot(dx, dy);
            const maxDist = rect.width/2 - 30; 

            if (distance > maxDist) { dx = (dx / distance) * maxDist; dy = (dy / distance) * maxDist; }

            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            joyVec.x = dx / maxDist;
            joyVec.y = dy / maxDist;
        }
        function handleJoyEnd(e) {
            if(e.touches.length === 0 || !Array.from(e.touches).some(t => t.target === joyBase || t.target === joyStick)) {
                joyActive = false;
                joyStick.style.transform = `translate(0px, 0px)`;
                joyVec.x = 0; joyVec.y = 0;
            }
        }

        function triggerDash(player) {
            if (player.dashCooldown <= 0) {
                let mag = Math.hypot(player.vx, player.vy);
                if (mag > 0.5) {
                    player.vx += (player.vx / mag) * 15;
                    player.vy += (player.vy / mag) * 15;
                } else {
                    let dx = ball.x - player.x;
                    let dy = ball.y - player.y;
                    let bmag = Math.hypot(dx, dy);
                    player.vx += (dx / bmag) * 15;
                    player.vy += (dy / bmag) * 15;
                }
                player.dashCooldown = 120; 
                
                if(player === p1) {
                    mobKickBtn.classList.add('cooldown');
                    mobKickBtn.innerText = 'WAIT';
                    setTimeout(() => { 
                        mobKickBtn.classList.remove('cooldown'); 
                        mobKickBtn.innerText = 'DASH';
                    }, 2000);
                }
            }
        }

        // --- MATH & PHYSICS ---
        function applyForce(entity, ax, ay, maxS = entity.maxSpeed) {
            entity.vx += ax;
            entity.vy += ay;
            const speed = Math.hypot(entity.vx, entity.vy);
            if (speed > maxS && !(entity.dashCooldown && entity.dashCooldown > 110)) { 
                entity.vx = (entity.vx / speed) * maxS;
                entity.vy = (entity.vy / speed) * maxS;
            }
        }

        function resolveCollision(e1, e2) {
            const dx = e2.x - e1.x;
            const dy = e2.y - e1.y;
            const distance = Math.hypot(dx, dy);
            const minDist = e1.r + e2.r;

            if (distance < minDist) {
                const overlap = minDist - distance;
                const nx = dx / distance;
                const ny = dy / distance;
                
                const totalMass = e1.mass + e2.mass;
                const r1 = e2.mass / totalMass;
                const r2 = e1.mass / totalMass;

                e1.x -= nx * overlap * r1;
                e1.y -= ny * overlap * r1;
                e2.x += nx * overlap * r2;
                e2.y += ny * overlap * r2;

                const kx = e1.vx - e2.vx;
                const ky = e1.vy - e2.vy;
                const p = 2 * (nx * kx + ny * ky) / totalMass;
                
                const restitution = 1.1; 
                e1.vx -= p * e2.mass * restitution;
                e1.vy -= p * e2.mass * restitution;
                e2.vx += p * e1.mass * restitution;
                e2.vy += p * e1.mass * restitution;
            }
        }

        function wallBounce(e, isBall=false) {
            const topG = (GAME_H - GOAL_H) / 2;
            const botG = topG + GOAL_H;

            if (e.y - e.r < 0) { e.y = e.r; e.vy *= -0.8; }
            if (e.y + e.r > GAME_H) { e.y = GAME_H - e.r; e.vy *= -0.8; }

            if (e.x - e.r < 0) {
                if (isBall && e.y > topG && e.y < botG) {
                    if (e.x < -10) scoreGoal(2);
                } else {
                    e.x = e.r; e.vx *= -0.8;
                }
            }
            if (e.x + e.r > GAME_W) {
                if (isBall && e.y > topG && e.y < botG) {
                    if (e.x > GAME_W + 10) scoreGoal(1);
                } else {
                    e.x = GAME_W - e.r; e.vx *= -0.8;
                }
            }
        }

        function scoreGoal(playerScored) {
            if(playerScored === 1) score1++;
            else score2++;
            
            document.getElementById('score-p1').innerText = score1;
            document.getElementById('score-p2').innerText = score2;
            
            canvas.classList.remove('shake');
            void canvas.offsetWidth; 
            canvas.classList.add('shake');
            canvas.style.filter = playerScored === 1 ? `brightness(2) drop-shadow(0 0 50px ${playerTheme.color})` : `brightness(2) drop-shadow(0 0 50px ${ocTheme.color})`;
            setTimeout(() => { canvas.style.filter = 'none'; }, 300);

            resetPositions();
        }

        function resetPositions() {
            const entities = getEntities();
            entities.forEach(e => {
                e.x = e.homeX;
                e.y = e.homeY;
                e.vx = 0;
                e.vy = 0;
            });
            ball.x = GAME_W/2; ball.y = GAME_H/2; ball.vx = 0; ball.vy = 0;
            ball.history = [];
        }

        // --- DYNAMIC AI LOGIC (5v5) ---
        function updateBots() {
            // Difficulty Multiplier (0.0 to 1.0)
            const difficulty = Math.max(0, Math.min(1, (180 - timeLeft) / 180));
            
            // Scale OC Speed
            const ocBaseSpd = 0.2 + (0.4 * difficulty);
            const ocMaxSpd = 3.5 + (4 * difficulty);

            // 1. Process Friendly AI (Team 1)
            let closestFriendlyDist = Infinity;
            let closestFriendlyBot = null;

            team1.forEach(bot => {
                if(bot.role === 'field') {
                    const dist = Math.hypot(ball.x - bot.x, ball.y - bot.y);
                    if(dist < closestFriendlyDist) { closestFriendlyDist = dist; closestFriendlyBot = bot; }
                }
            });

            team1.forEach(bot => {
                let targetX, targetY;
                if(bot.role === 'goalie') {
                    targetX = bot.homeX;
                    targetY = Math.max((GAME_H - GOAL_H)/2 + 20, Math.min(ball.y, (GAME_H + GOAL_H)/2 - 20));
                } else if(bot === closestFriendlyBot && ball.x < GAME_W * 0.7) {
                    // Chase ball
                    targetX = ball.x - 15; targetY = ball.y;
                } else {
                    // Maintain formation
                    targetX = bot.homeX + (ball.x - GAME_W/2)*0.3;
                    targetY = bot.homeY + (ball.y - GAME_H/2)*0.3;
                }
                const dx = targetX - bot.x; const dy = targetY - bot.y; const dist = Math.hypot(dx, dy);
                if (dist > 10) applyForce(bot, (dx/dist)*bot.baseSpeed, (dy/dist)*bot.baseSpeed, bot.maxSpeed);
            });

            // 2. Process Enemy AI (Team 2 & OC Cap)
            let ocSquad = [oc_cap, ...team2];
            let closestEnemyDist = Infinity;
            let closestEnemyBot = null;

            ocSquad.forEach(bot => {
                if(bot.role === 'field') {
                    const dist = Math.hypot(ball.x - bot.x, ball.y - bot.y);
                    if(dist < closestEnemyDist) { closestEnemyDist = dist; closestEnemyBot = bot; }
                }
            });

            ocSquad.forEach(bot => {
                let targetX, targetY;
                if(bot.role === 'goalie') {
                    targetX = bot.homeX;
                    targetY = Math.max((GAME_H - GOAL_H)/2 + 20, Math.min(ball.y, (GAME_H + GOAL_H)/2 - 20));
                } else if(bot === closestEnemyBot) {
                    // Chase ball (Anti-Trap Logic Included)
                    if(ball.x > GAME_W - 60) {
                        targetX = ball.x - 30;
                        targetY = ball.y > GAME_H/2 ? ball.y - 30 : ball.y + 30;
                    } else {
                        targetX = ball.x + 15; targetY = ball.y;
                    }
                } else {
                    // Maintain formation
                    targetX = bot.homeX + (ball.x - GAME_W/2)*0.3;
                    targetY = bot.homeY + (ball.y - GAME_H/2)*0.3;
                }
                
                // Keep target in bounds
                targetX = Math.max(30, Math.min(targetX, GAME_W - 30));
                targetY = Math.max(30, Math.min(targetY, GAME_H - 30));

                const dx = targetX - bot.x; const dy = targetY - bot.y; const dist = Math.hypot(dx, dy);
                if (dist > 10) applyForce(bot, (dx/dist)*ocBaseSpd, (dy/dist)*ocBaseSpd, ocMaxSpd);
            });
        }

        // --- MAIN UPDATE LOOP ---
        function update() {
            // Player Movement
            let ax = 0, ay = 0;
            if (joyActive) {
                ax = joyVec.x * p1.speed; ay = joyVec.y * p1.speed;
            } else {
                if (keys.w || keys.ArrowUp) ay -= p1.speed;
                if (keys.s || keys.ArrowDown) ay += p1.speed;
                if (keys.a || keys.ArrowLeft) ax -= p1.speed;
                if (keys.d || keys.ArrowRight) ax += p1.speed;
            }
            applyForce(p1, ax, ay);

            if (p1.dashCooldown > 0) p1.dashCooldown--;
            if (keys[' '] || mobileKickPressed) triggerDash(p1);

            updateBots();

            const entities = getEntities();
            
            entities.forEach(e => {
                e.vx *= friction; e.vy *= friction;
                e.x += e.vx; e.y += e.vy;
            });

            ball.vx *= 0.98; ball.vy *= 0.98; 
            ball.x += ball.vx; ball.y += ball.vy;

            // Ball Trail
            if (Math.hypot(ball.vx, ball.vy) > 3) {
                ball.history.push({x: ball.x, y: ball.y});
                if (ball.history.length > 8) ball.history.shift();
            } else {
                if(ball.history.length > 0) ball.history.shift();
            }

            // Entity Collisions
            for(let i=0; i<entities.length; i++) {
                for(let j=i+1; j<entities.length; j++) {
                    resolveCollision(entities[i], entities[j]);
                }
                resolveCollision(entities[i], ball);
                wallBounce(entities[i]);
            }
            wallBounce(ball, true);
        }

        function drawEntity(ctx, entity, isOC, isCaptain) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(entity.x, entity.y, entity.r, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            
            const color = isOC ? ocTheme.color : (playerTheme ? playerTheme.color : '#fff');
            
            ctx.lineWidth = isCaptain ? 4 : 2;
            ctx.strokeStyle = color;
            ctx.stroke();
            ctx.clip();

            if (isCaptain) {
                const img = isOC ? ocImg : playerImg;
                if (img.complete) {
                    const angle = Math.atan2(entity.vy, entity.vx);
                    ctx.translate(entity.x, entity.y);
                    if(Math.hypot(entity.vx, entity.vy) > 0.5) ctx.rotate(angle);
                    ctx.drawImage(img, -entity.r + 5, -entity.r + 5, entity.r*2 - 10, entity.r*2 - 10);
                }
            } else {
                // Fill simple bots with faint color
                ctx.fillStyle = color + '40';
                ctx.fill();
            }
            ctx.restore();
            
            // Glow
            ctx.beginPath();
            ctx.arc(entity.x, entity.y, entity.r, 0, Math.PI * 2);
            if(entity.dashCooldown && entity.dashCooldown > 100) {
                ctx.shadowColor = '#fff'; ctx.shadowBlur = 30; ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
            } else {
                ctx.shadowColor = color; ctx.shadowBlur = isCaptain ? 15 : 5; ctx.strokeStyle = color; ctx.lineWidth = isCaptain ? 2 : 1;
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function render() {
            ctx.save();
            ctx.scale(canvas.width / GAME_W, canvas.height / GAME_H);
            ctx.clearRect(0, 0, GAME_W, GAME_H);

            // Pitch Lines
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(GAME_W/2, 0); ctx.lineTo(GAME_W/2, GAME_H); ctx.stroke();
            ctx.beginPath(); ctx.arc(GAME_W/2, GAME_H/2, 70, 0, Math.PI*2); ctx.stroke();
            
            const topG = (GAME_H - GOAL_H) / 2;
            ctx.fillStyle = playerTheme ? playerTheme.color + '40' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, topG, 40, GOAL_H);
            ctx.fillStyle = ocTheme.color + '40';
            ctx.fillRect(GAME_W - 40, topG, 40, GOAL_H);

            // Ball Trail
            if (ball.history.length > 0) {
                ctx.beginPath();
                ctx.moveTo(ball.history[0].x, ball.history[0].y);
                for(let i=1; i<ball.history.length; i++) ctx.lineTo(ball.history[i].x, ball.history[i].y);
                ctx.lineTo(ball.x, ball.y);
                ctx.strokeStyle = playerTheme ? playerTheme.color + '80' : 'rgba(255,255,255,0.5)';
                ctx.lineWidth = ball.r * 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.shadowColor = playerTheme ? playerTheme.color : '#fff'; ctx.shadowBlur = 20;
                ctx.stroke(); ctx.shadowBlur = 0;
            }

            // Draw Entities
            drawEntity(ctx, p1, false, true); // User Captain
            team1.forEach(bot => drawEntity(ctx, bot, false, false)); // Friendly bots
            
            drawEntity(ctx, oc_cap, true, true); // OC Captain
            team2.forEach(bot => drawEntity(ctx, bot, true, false)); // OC bots

            // Ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        function loop() {
            if (!matchOver) requestAnimationFrame(loop);

            let now = Date.now();
            let elapsed = now - then;

            if (elapsed > fpsInterval && isPlaying) {
                then = now - (elapsed % fpsInterval);
                update();
                render();
            }
        }

        // --- GAME FLOW & DATABASE ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startGame(factionKey) {
            playerTheme = themes[factionKey];
            playerImg.src = playerTheme.img;
            
            document.getElementById('setup-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('hud-faction-name').innerText = playerTheme.name;
                document.getElementById('score-p1').style.color = playerTheme.color;
                document.getElementById('game-wrapper').style.backgroundImage = `radial-gradient(circle at center, ${playerTheme.color}30 0%, #000000 100%)`;
                
                then = Date.now();
                isPlaying = true;
                startTimer();
                loop();
            }, 500);
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.innerText = formatTime(timeLeft);
            
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = formatTime(timeLeft);
                
                // Dynamic difficulty visual warning
                if (timeLeft <= 30) timerEl.classList.add('timer-warning');

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    endGame();
                }
            }, 1000);
        }

        async function endGame() {
            isPlaying = false;
            matchOver = true;
            
            const postScreen = document.getElementById('post-screen');
            postScreen.style.display = 'flex';
            void postScreen.offsetWidth; 
            postScreen.style.opacity = '1';

            const title = document.getElementById('post-title');
            document.getElementById('post-p1-name').innerText = playerTheme.name;
            document.getElementById('post-p1-name').style.color = playerTheme.color;
            document.getElementById('post-p1-score').innerText = score1;
            document.getElementById('post-p2-score').innerText = score2;

            if (score1 > score2) { title.innerText = "VICTORY"; title.style.color = playerTheme.color; }
            else if (score2 > score1) { title.innerText = "DEFEAT"; title.style.color = 'red'; }
            else { title.innerText = "DRAW"; title.style.color = 'gray'; }

            if (typeof db !== 'undefined') {
                try {
                    const factionRef = db.collection('futsal_league').doc(playerTheme.name.toLowerCase().replace(' ', '_').split('_')[0]); 
                    
                    let winsAdd = score1 > score2 ? 1 : 0;
                    let drawsAdd = score1 === score2 ? 1 : 0;

                    await factionRef.set({
                        matchesPlayed: firebase.firestore.FieldValue.increment(1),
                        goalsFor: firebase.firestore.FieldValue.increment(score1),
                        goalsAgainst: firebase.firestore.FieldValue.increment(score2),
                        wins: firebase.firestore.FieldValue.increment(winsAdd),
                        draws: firebase.firestore.FieldValue.increment(drawsAdd)
                    }, { merge: true });

                    document.getElementById('post-subtitle').innerText = "Mainframe Updated Successfully.";
                    document.getElementById('post-subtitle').style.color = "#2ecc71";
                } catch (error) {
                    console.error("DB Update Failed:", error);
                    document.getElementById('post-subtitle').innerText = "Network Error: Stats not saved.";
                    document.getElementById('post-subtitle').style.color = "red";
                }
            } else {
                document.getElementById('post-subtitle').innerText = "Database offline.";
            }
        }

        render();
    </script>
</body>
