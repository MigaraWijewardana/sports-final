<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORTS LCM | Neon Futsal</title>
    <link rel="icon" href="/public/images/logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; touch-action: none; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        #game-wrapper {
            flex-grow: 1; position: relative; width: 100vw; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }

        canvas {
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255,255,255,0.05);
            max-width: 100%; max-height: 100%; object-fit: contain; cursor: none;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-3px, -3px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%; pointer-events: none; z-index: 50;
        }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 15, 0.95); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;
        }

        .faction-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .faction-btn:hover { transform: scale(1.05) translateY(-5px); }

        #hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; align-items: center; z-index: 40; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
        }

        .score-num { font-family: 'Freshman', sans-serif; font-size: 3rem; text-shadow: 0 0 15px currentColor; }
        .hud-name { font-size: 0.7rem; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; color: white; opacity: 0.7; }
        #timer { font-family: monospace; font-size: 1.5rem; font-weight: bold; color: white; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 8px; transition: color 0.3s; }
        .timer-warning { color: #e74c3c !important; animation: pulse-text 1s infinite; }
        @keyframes pulse-text { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 768px) { #hud { top: 10px; transform: translateX(-50%) scale(0.8); } }
    </style>
</head>
<body>

    <nav class="absolute top-4 left-4 z-[110]">
        <a href="index.html" class="text-[10px] font-bold tracking-widest uppercase text-white hover:text-[#FFB81C] bg-black/60 px-4 py-2 rounded-full border border-white/20 backdrop-blur-md">
            <i class="fa-solid fa-arrow-left mr-2"></i> Abort
        </a>
    </nav>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="overlay-screen">
        <h1 class="font-freshman text-4xl md:text-6xl text-white mb-2 uppercase tracking-widest drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">THE ARENA</h1>
        <p class="text-[#def5ff]/60 text-sm tracking-[0.3em] uppercase mb-12 border-b border-white/10 pb-4">Select your allegiance</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 w-full max-w-4xl px-4">
            <button class="faction-btn glass-card p-6 border-[#3498db]/30 flex flex-col items-center group" onclick="startGame('iGV')">
                <img src="/public/images/mascots/pantherface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#3498db] group-hover:scale-110 transition-transform" alt="iGV">
                <span class="font-freshman text-2xl text-[#3498db]">iGV</span>
            </button>
            <button class="faction-btn glass-card p-6 border-[#ffffff]/30 flex flex-col items-center group" onclick="startGame('iGT')">
                <img src="/public/images/mascots/wolfface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#ffffff] group-hover:scale-110 transition-transform" alt="iGT">
                <span class="font-freshman text-2xl text-[#ffffff]">iGT</span>
            </button>
            <button class="faction-btn glass-card p-6 border-[#7f8c8d]/30 flex flex-col items-center group" onclick="startGame('oGV')">
                <img src="/public/images/mascots/tigerface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#7f8c8d] group-hover:scale-110 transition-transform" alt="oGV">
                <span class="font-freshman text-2xl text-[#7f8c8d]">oGV</span>
            </button>
            <button class="faction-btn glass-card p-6 border-[#f1c40f]/30 flex flex-col items-center group" onclick="startGame('oGT')">
                <img src="/public/images/mascots/phoenixface.png" class="h-20 md:h-24 mb-4 drop-shadow-[0_0_15px_#f1c40f] group-hover:scale-110 transition-transform" alt="oGT">
                <span class="font-freshman text-2xl text-[#f1c40f]">oGT</span>
            </button>
        </div>
        
        <div class="mt-12 flex flex-col items-center text-white/50 text-xs font-mono uppercase tracking-widest gap-2">
            <span><i class="fa-solid fa-computer-mouse mr-2 text-[#FFB81C]"></i> PC: Move mouse to control striker</span>
            <span><i class="fa-solid fa-hand-pointer mr-2 text-[#FFB81C]"></i> Mobile: Drag finger on your side</span>
        </div>
        <p class="text-[#FFB81C] text-[10px] uppercase tracking-widest mt-6 font-bold">Match Duration: 3 Minutes</p>
    </div>

    <!-- POST MATCH SCREEN -->
    <div id="post-screen" class="overlay-screen" style="display: none; opacity: 0;">
        <h2 id="post-title" class="font-freshman text-6xl text-white uppercase tracking-widest mb-4">MATCH OVER</h2>
        <p id="post-subtitle" class="text-sm font-bold tracking-[0.3em] uppercase text-white/50 mb-10">Syncing with Mainframe...</p>
        
        <div class="flex items-center gap-8 mb-12 bg-white/5 p-8 rounded-2xl border border-white/10 shadow-2xl">
            <div class="text-center">
                <span class="block text-xs uppercase tracking-widest text-[#FFB81C] mb-2 font-bold" id="post-p1-name">YOU</span>
                <span class="font-freshman text-6xl text-white" id="post-p1-score">0</span>
            </div>
            <span class="text-white/20 text-2xl font-black">VS</span>
            <div class="text-center">
                <span class="block text-xs uppercase tracking-widest text-[#561269] mb-2 font-bold">THE OC</span>
                <span class="font-freshman text-6xl text-white" id="post-p2-score">0</span>
            </div>
        </div>

        <button onclick="location.reload()" class="bg-[#FFB81C] text-[#1A0524] font-bold px-12 py-4 rounded-full uppercase tracking-widest hover:bg-white transition-colors shadow-[0_0_20px_rgba(255,184,28,0.4)]">Play Again</button>
    </div>

    <!-- GAME AREA -->
    <div id="game-wrapper">
        <div id="hud" style="display: none;">
            <div class="flex flex-col items-center">
                <span class="hud-name" id="hud-faction-name">YOU</span>
                <span class="score-num" id="score-p1" style="color: #3498db;">0</span>
            </div>
            <div id="timer">3:00</div>
            <div class="flex flex-col items-center">
                <span class="hud-name text-[#FFB81C]">THE OC</span>
                <span class="score-num text-[#561269]" id="score-p2">0</span>
            </div>
        </div>

        <canvas id="pitch"></canvas>
        <div class="crt-overlay"></div>
    </div>

    <script src="/src/js/firebase.js"></script>

    <script>
        // --- GAME ASSETS & THEMES ---
        const themes = {
            'iGV': { color: '#3498db', img: '/public/images/mascots/pantherface.png', name: 'iGV' },
            'iGT': { color: '#ffffff', img: '/public/images/mascots/wolfface.png', name: 'iGT' },
            'oGV': { color: '#7f8c8d', img: '/public/images/mascots/tigerface.png', name: 'oGV' },
            'oGT': { color: '#f1c40f', img: '/public/images/mascots/phoenixface.png', name: 'oGT' }
        };
        const ocTheme = { color: '#561269', img: '/public/images/logo.png', name: 'THE OC' };

        let playerTheme = null;
        let playerImg = new Image();
        let ocImg = new Image();
        ocImg.src = ocTheme.img;

        // --- ENGINE SETUP ---
        const canvas = document.getElementById('pitch');
        const ctx = canvas.getContext('2d');
        const GAME_W = 1000;
        const GAME_H = 600;
        const GOAL_H = 220; // Wide goal for faster scoring

        let scaleRatio = 1;
        let canvasRect = null;

        function resize() {
            const aspect = GAME_W / GAME_H;
            const wrapper = document.getElementById('game-wrapper');
            const windowAspect = wrapper.clientWidth / wrapper.clientHeight;
            
            if (windowAspect < aspect) {
                canvas.width = wrapper.clientWidth * 0.95;
                canvas.height = canvas.width / aspect;
            } else {
                canvas.height = wrapper.clientHeight * 0.85;
                canvas.width = canvas.height * aspect;
            }
            scaleRatio = canvas.width / GAME_W;
            canvasRect = canvas.getBoundingClientRect();
        }
        window.addEventListener('resize', resize);
        resize();

        // --- ARCADE ENTITIES ---
        // Player directly follows targetX/Y. No heavy momentum dragging them.
        let p1 = { x: 200, y: GAME_H/2, targetX: 200, targetY: GAME_H/2, vx: 0, vy: 0, r: 40, mass: 5 };
        let p2 = { x: GAME_W - 200, y: GAME_H/2, targetX: GAME_W - 200, targetY: GAME_H/2, vx: 0, vy: 0, r: 40, mass: 5 }; 
        let puck = { x: GAME_W/2, y: GAME_H/2, vx: 0, vy: 0, r: 20, maxSpeed: 30, history: [] }; // Lightning fast puck
        
        let particles = [];
        let score1 = 0, score2 = 0, timeLeft = 180, isPlaying = false, matchOver = false;

        const fps = 60;
        const fpsInterval = 1000 / fps;
        let then = Date.now();

        // --- DIRECT INPUT TRACKING ---
        function updatePlayerTarget(clientX, clientY) {
            if(!canvasRect || !isPlaying) return;
            let logicalX = (clientX - canvasRect.left) / scaleRatio;
            let logicalY = (clientY - canvasRect.top) / scaleRatio;

            // Restrict P1 to left half and within walls
            p1.targetX = Math.max(p1.r, Math.min(logicalX, GAME_W/2 - p1.r));
            p1.targetY = Math.max(p1.r, Math.min(logicalY, GAME_H - p1.r));
        }

        canvas.addEventListener('mousemove', (e) => updatePlayerTarget(e.clientX, e.clientY));
        
        document.addEventListener('touchmove', (e) => {
            if(isPlaying && !matchOver) {
                e.preventDefault(); 
                updatePlayerTarget(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});

        // --- VISUAL EFFECTS (JUICE) ---
        function createSparks(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1, color: color
                });
            }
        }

        // --- ARCADE COLLISION ---
        function resolvePuckCollision(mallet) {
            const dx = puck.x - mallet.x;
            const dy = puck.y - mallet.y;
            const dist = Math.hypot(dx, dy);
            const minDist = mallet.r + puck.r;

            if (dist < minDist) {
                // Push puck outside mallet
                const overlap = minDist - dist;
                const nx = dx / dist;
                const ny = dy / dist;
                puck.x += nx * overlap;
                puck.y += ny * overlap;

                // Add mallet's physical movement speed into the puck (The "Smash")
                puck.vx += (mallet.vx * 1.5);
                puck.vy += (mallet.vy * 1.5);

                // Add pure bounce
                const bounciness = 5;
                puck.vx += nx * bounciness;
                puck.vy += ny * bounciness;

                // Speed cap
                const speed = Math.hypot(puck.vx, puck.vy);
                if (speed > puck.maxSpeed) {
                    puck.vx = (puck.vx / speed) * puck.maxSpeed;
                    puck.vy = (puck.vy / speed) * puck.maxSpeed;
                }

                createSparks(puck.x - nx*puck.r, puck.y - ny*puck.r, mallet === p1 ? playerTheme.color : ocTheme.color);
            }
        }

        function wallBounce(e, isPuck) {
            const topG = (GAME_H - GOAL_H) / 2;
            const botG = topG + GOAL_H;
            
            // Highly bouncy walls for the puck
            const bounceLoss = isPuck ? 1.0 : 0.5;

            if (e.y - e.r < 0) { e.y = e.r; e.vy *= -bounceLoss; }
            if (e.y + e.r > GAME_H) { e.y = GAME_H - e.r; e.vy *= -bounceLoss; }

            if (e.x - e.r < 0) {
                if (isPuck && e.y > topG && e.y < botG) {
                    if (e.x < -20) scoreGoal(2);
                } else { e.x = e.r; e.vx *= -bounceLoss; }
            }
            
            if (e.x + e.r > GAME_W) {
                if (isPuck && e.y > topG && e.y < botG) {
                    if (e.x > GAME_W + 20) scoreGoal(1);
                } else { e.x = GAME_W - e.r; e.vx *= -bounceLoss; }
            }
        }

        function scoreGoal(playerScored) {
            if(playerScored === 1) score1++;
            else score2++;
            
            document.getElementById('score-p1').innerText = score1;
            document.getElementById('score-p2').innerText = score2;
            
            canvas.classList.remove('shake');
            void canvas.offsetWidth;
            canvas.classList.add('shake');
            
            // Massive goal flash
            canvas.style.filter = playerScored === 1 ? `brightness(3) drop-shadow(0 0 80px ${playerTheme.color})` : `brightness(3) drop-shadow(0 0 80px ${ocTheme.color})`;
            setTimeout(() => { canvas.style.filter = 'none'; }, 400);

            resetPositions();
        }

        function resetPositions() {
            p1.x = 200; p1.y = GAME_H/2; p1.targetX = 200; p1.targetY = GAME_H/2; p1.vx = 0; p1.vy = 0;
            p2.x = GAME_W - 200; p2.y = GAME_H/2; p2.targetX = GAME_W - 200; p2.targetY = GAME_H/2; p2.vx = 0; p2.vy = 0;
            puck.x = GAME_W/2; puck.y = GAME_H/2; puck.vx = 0; puck.vy = 0;
            puck.history = [];
        }

        // --- BOT AI (SMOOTH & FAIR) ---
        function updateBot() {
            if (puck.x > GAME_W/2) {
                // Puck is on OC side. Defend and Strike.
                p2.targetY = puck.y;
                if (puck.x > p2.x + 20) {
                    // Puck behind bot, rush back
                    p2.targetX = GAME_W - 80;
                } else {
                    // Smash puck
                    p2.targetX = puck.x - 20;
                }
            } else {
                // Puck on player side. Return to goal center.
                p2.targetX = GAME_W - 100;
                // Slowly track puck Y to anticipate
                p2.targetY += (puck.y - p2.targetY) * 0.05;
            }

            // Keep bot in bounds and strictly on right side
            p2.targetX = Math.max(GAME_W/2 + p2.r, Math.min(p2.targetX, GAME_W - p2.r));
            p2.targetY = Math.max(p2.r, Math.min(p2.targetY, GAME_H - p2.r));
        }

        // --- MAIN UPDATE LOOP ---
        function update() {
            // Track Mallet 1 to target smoothly
            let dx1 = p1.targetX - p1.x;
            let dy1 = p1.targetY - p1.y;
            p1.vx = dx1 * 0.4; 
            p1.vy = dy1 * 0.4;
            p1.x += p1.vx; p1.y += p1.vy;

            // Track Mallet 2
            updateBot();
            let dx2 = p2.targetX - p2.x;
            let dy2 = p2.targetY - p2.y;
            p2.vx = dx2 * 0.2; // Bot is slightly slower to give player advantage
            p2.vy = dy2 * 0.2;
            p2.x += p2.vx; p2.y += p2.vy;

            // Air Hockey Puck Physics
            puck.vx *= 0.99; puck.vy *= 0.99; // Almost zero friction
            
            // Anti-Stuck logic (if puck barely moving, slowly drift it to center)
            if(Math.hypot(puck.vx, puck.vy) < 0.5 && (puck.x < 100 || puck.x > GAME_W-100)) {
                puck.vx += (GAME_W/2 - puck.x) * 0.001;
            }

            puck.x += puck.vx; puck.y += puck.vy;

            if (Math.hypot(puck.vx, puck.vy) > 3) {
                puck.history.push({x: puck.x, y: puck.y});
                if (puck.history.length > 15) puck.history.shift();
            } else {
                if(puck.history.length > 0) puck.history.shift();
            }

            resolvePuckCollision(p1);
            resolvePuckCollision(p2);
            
            // Mallet Center Line Clash
            const mdx = p2.x - p1.x;
            const mdy = p2.y - p1.y;
            if(Math.hypot(mdx, mdy) < p1.r + p2.r) {
                p2.x += mdx * 0.1;
                p1.x -= mdx * 0.1;
            }

            wallBounce(puck, true);

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.04;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawMallet(ctx, entity, img, color) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(entity.x, entity.y, entity.r, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0a';
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.clip(); 
            
            if (img.complete) {
                const angle = Math.atan2(entity.vy, entity.vx);
                ctx.translate(entity.x, entity.y);
                if(Math.hypot(entity.vx, entity.vy) > 2) ctx.rotate(angle * 0.2); 
                ctx.drawImage(img, -entity.r + 5, -entity.r + 5, entity.r*2 - 10, entity.r*2 - 10);
            }
            ctx.restore();
        }

        function render() {
            ctx.save();
            ctx.scale(canvas.width / GAME_W, canvas.height / GAME_H);
            ctx.clearRect(0, 0, GAME_W, GAME_H);

            // Pitch Lines
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(GAME_W/2, 0); ctx.lineTo(GAME_W/2, GAME_H); ctx.stroke();
            ctx.beginPath(); ctx.arc(GAME_W/2, GAME_H/2, 120, 0, Math.PI*2); ctx.stroke();
            
            const topG = (GAME_H - GOAL_H) / 2;
            ctx.fillStyle = playerTheme ? playerTheme.color + '60' : 'rgba(255,255,255,0.2)';
            ctx.fillRect(0, topG, 20, GOAL_H);
            ctx.fillStyle = ocTheme.color + '60';
            ctx.fillRect(GAME_W - 20, topG, 20, GOAL_H);

            // Puck Trail
            if (puck.history.length > 1) {
                ctx.beginPath();
                ctx.moveTo(puck.history[0].x, puck.history[0].y);
                for(let i=1; i<puck.history.length; i++) ctx.lineTo(puck.history[i].x, puck.history[i].y);
                ctx.lineTo(puck.x, puck.y);
                ctx.strokeStyle = playerTheme ? playerTheme.color + 'AA' : 'rgba(255,255,255,0.8)';
                ctx.lineWidth = puck.r * 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.shadowColor = playerTheme ? playerTheme.color : '#fff'; ctx.shadowBlur = 20;
                ctx.stroke(); ctx.shadowBlur = 0;
            }

            // Particles
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            drawMallet(ctx, p1, playerImg, playerTheme ? playerTheme.color : '#fff');
            drawMallet(ctx, p2, ocImg, ocTheme.color);

            // Neon Puck
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        // --- FPS LIMITED LOOP ---
        function loop() {
            if (!matchOver) requestAnimationFrame(loop);
            let now = Date.now();
            let elapsed = now - then;

            if (elapsed > fpsInterval && isPlaying) {
                then = now - (elapsed % fpsInterval);
                update();
                render();
            }
        }

        // --- GAME FLOW & DATABASE ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startGame(factionKey) {
            canvasRect = canvas.getBoundingClientRect(); 
            playerTheme = themes[factionKey];
            playerImg.src = playerTheme.img;
            
            document.getElementById('setup-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('hud-faction-name').innerText = playerTheme.name;
                document.getElementById('score-p1').style.color = playerTheme.color;
                document.getElementById('game-wrapper').style.backgroundImage = `radial-gradient(circle at center, ${playerTheme.color}20 0%, #000000 100%)`;
                
                then = Date.now();
                isPlaying = true;
                startTimer();
                loop();
            }, 500);
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.innerText = formatTime(timeLeft);
            
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = formatTime(timeLeft);
                if (timeLeft <= 30) timerEl.classList.add('timer-warning');

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    endGame();
                }
            }, 1000);
        }

        async function endGame() {
            isPlaying = false;
            matchOver = true;
            
            const postScreen = document.getElementById('post-screen');
            postScreen.style.display = 'flex';
            void postScreen.offsetWidth; 
            postScreen.style.opacity = '1';

            const title = document.getElementById('post-title');
            document.getElementById('post-p1-name').innerText = playerTheme.name;
            document.getElementById('post-p1-name').style.color = playerTheme.color;
            document.getElementById('post-p1-score').innerText = score1;
            document.getElementById('post-p2-score').innerText = score2;

            if (score1 > score2) { title.innerText = "VICTORY"; title.style.color = playerTheme.color; }
            else if (score2 > score1) { title.innerText = "DEFEAT"; title.style.color = 'red'; }
            else { title.innerText = "DRAW"; title.style.color = 'gray'; }

            if (typeof db !== 'undefined') {
                try {
                    const factionRef = db.collection('futsal_league').doc(playerTheme.name.toLowerCase().replace(' ', '_').split('_')[0]); 
                    
                    let winsAdd = score1 > score2 ? 1 : 0;
                    let drawsAdd = score1 === score2 ? 1 : 0;

                    await factionRef.set({
                        matchesPlayed: firebase.firestore.FieldValue.increment(1),
                        goalsFor: firebase.firestore.FieldValue.increment(score1),
                        goalsAgainst: firebase.firestore.FieldValue.increment(score2),
                        wins: firebase.firestore.FieldValue.increment(winsAdd),
                        draws: firebase.firestore.FieldValue.increment(drawsAdd)
                    }, { merge: true });

                    document.getElementById('post-subtitle').innerText = "Mainframe Updated Successfully.";
                    document.getElementById('post-subtitle').style.color = "#2ecc71";
                } catch (error) {
                    console.error("DB Update Failed:", error);
                    document.getElementById('post-subtitle').innerText = "Network Error: Stats not saved.";
                    document.getElementById('post-subtitle').style.color = "red";
                }
            } else {
                document.getElementById('post-subtitle').innerText = "Database offline.";
            }
        }

        render();
    </script>
</body>
</html>
